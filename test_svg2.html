<!DOCTYPE html>
<html>
<body>
<svg width="400" height="400" style="border: 1px solid black;">
    <g transform="translate(100, 50)">
        <circle cx="0" cy="0" r="3" fill="red"/>
        <text x="0" y="0" fill="red" text-anchor="middle" font-size="12px" font-weight="bold"
            writing-mode="tb" style="transform: translate(-20px, 135px) rotate(180deg);">
            Original</text>
    </g>

    <g transform="translate(200, 50)">
        <circle cx="0" cy="0" r="3" fill="blue"/>
        <text x="0" y="0" fill="blue" text-anchor="middle" font-size="12px" font-weight="bold"
            transform="translate(-20, 135) rotate(-90)">
            New</text>
    </g>
</svg>
</body>
</html>
