<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Libra+</title>
  <meta
    name="description"
    content="Libra+ compositional interaction demos for data visualization, including selection, navigation, rearrangement, and visual aids."
  >
</head>
<body>
  <div id="AppLayout" class="app-layout">
    <main class="playground-column">
      <div id="LibraPlayground" class="playground-pane"></div>
    </main>

    <aside id="JsonColumn" class="editor-column">
      <h3 class="pane-title">JSON</h3>
      <div id="JsonPane" class="editor-pane"></div>
    </aside>

    <aside id="JsColumn" class="editor-column">
      <h3 class="pane-title">JS</h3>
      <div id="JsEditor" class="editor-pane editor-pane-script"></div>
      <pre id="JsPane" class="editor-fallback"></pre>
    </aside>
  </div>
</body>
</html>
